<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rehoteq RMS — School Result Management</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
/* ============================================================
   VARIABLES & RESET
   ============================================================ */
:root{
  --navy:#0a0f1e;
  --deep:#0f1628;
  --card:#141c30;
  --card2:#1a2240;
  --border:rgba(255,255,255,0.07);
  --gold:#c9a84c;
  --gold2:#f0c040;
  --green:#00c853;
  --red:#ff4444;
  --cyan:#00b4d8;
  --white:#f0f4ff;
  --muted:rgba(240,244,255,0.45);
  --font:'Outfit',sans-serif;
  --serif:'Playfair Display',serif;
  --mono:'DM Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--navy);color:var(--white);min-height:100vh;overflow-x:hidden;}
input,select,textarea,button{font-family:var(--font);}

/* ============================================================
   LAYOUT
   ============================================================ */
.app{display:flex;flex-direction:column;min-height:100vh;}
header{
  background:linear-gradient(135deg,var(--deep),var(--card));
  border-bottom:1px solid var(--border);
  padding:0.9rem 1.2rem;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,#8b6914,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:1rem;font-weight:900;color:#000;
  box-shadow:0 0 20px rgba(201,168,76,0.3);
}
.logo-text h1{font-family:var(--serif);font-size:1rem;font-weight:700;color:var(--white);}
.logo-text p{font-size:0.6rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
.header-right{display:flex;align-items:center;gap:10px;}
.school-badge{
  background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);
  border-radius:20px;padding:4px 12px;font-size:0.7rem;
  color:var(--gold);font-weight:600;display:none;
}
.sync-dot{
  width:8px;height:8px;border-radius:50%;background:#555;
  display:inline-block;margin-right:4px;
}
.sync-dot.on{background:var(--green);box-shadow:0 0 6px var(--green);}

/* MAIN */
main{flex:1;padding:1rem;max-width:900px;margin:0 auto;width:100%;}

/* SECTIONS */
section{display:none;}
section.active{display:block;}

/* PANELS */
.panel{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:1.2rem;margin-bottom:1rem;
}
.panel-title{
  font-family:var(--serif);font-size:1.05rem;font-weight:700;
  color:var(--white);margin-bottom:1rem;
  display:flex;align-items:center;gap:8px;
}
.panel-title span{color:var(--gold);}

/* FORMS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group label{font-size:0.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}
.form-group input,.form-group select,.form-group textarea{
  background:var(--card2);border:1px solid var(--border);border-radius:8px;
  padding:9px 12px;color:var(--white);font-size:0.85rem;outline:none;
  transition:border-color 0.2s;
}
.form-group input:focus,.form-group select:focus{border-color:rgba(201,168,76,0.4);}
.form-group select option{background:var(--card2);}
.full{grid-column:1/-1;}

/* BUTTONS */
.btn{
  border:none;border-radius:8px;padding:9px 18px;font-size:0.82rem;
  font-weight:600;cursor:pointer;transition:all 0.2s;display:inline-flex;
  align-items:center;gap:6px;
}
.btn-primary{background:linear-gradient(135deg,#8b6914,var(--gold));color:#000;}
.btn-primary:hover{opacity:0.9;transform:translateY(-1px);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.btn-danger{background:rgba(255,68,68,0.15);border:1px solid rgba(255,68,68,0.3);color:#ff6b6b;}
.btn-success{background:rgba(0,200,83,0.15);border:1px solid rgba(0,200,83,0.3);color:var(--green);}
.btn-sm{padding:6px 12px;font-size:0.75rem;}
.btn-block{width:100%;justify-content:center;}

/* BADGES */
.badge{
  display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;
  font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;
}
.badge-active{background:rgba(0,200,83,0.15);color:var(--green);border:1px solid rgba(0,200,83,0.3);}
.badge-due{background:rgba(255,165,0,0.15);color:orange;border:1px solid rgba(255,165,0,0.3);}
.badge-suspended{background:rgba(255,68,68,0.15);color:var(--red);border:1px solid rgba(255,68,68,0.3);}
.badge-t1{background:rgba(0,180,216,0.15);color:var(--cyan);}
.badge-t2{background:rgba(201,168,76,0.15);color:var(--gold);}
.badge-t3{background:rgba(0,200,83,0.15);color:var(--green);}

/* TABLES */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:0.82rem;}
th{background:var(--card2);color:var(--muted);padding:8px 10px;text-align:left;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);}
td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--white);}
tr:last-child td{border:none;}
tr:hover td{background:rgba(255,255,255,0.02);}

/* TOAST */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);
  background:var(--card2);border:1px solid var(--border);border-radius:10px;
  padding:10px 20px;font-size:0.82rem;color:var(--white);
  transition:transform 0.3s;z-index:9999;white-space:nowrap;
  box-shadow:0 8px 30px rgba(0,0,0,0.5);
}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.success{border-color:rgba(0,200,83,0.4);color:var(--green);}
#toast.error{border-color:rgba(255,68,68,0.4);color:var(--red);}

/* ALERT BOX */
.alert{
  border-radius:10px;padding:12px 16px;margin-bottom:1rem;
  font-size:0.82rem;display:flex;align-items:flex-start;gap:10px;
}
.alert-warning{background:rgba(255,165,0,0.08);border:1px solid rgba(255,165,0,0.25);color:orange;}
.alert-danger{background:rgba(255,68,68,0.08);border:1px solid rgba(255,68,68,0.25);color:#ff6b6b;}
.alert-success{background:rgba(0,200,83,0.08);border:1px solid rgba(0,200,83,0.25);color:var(--green);}
.alert-info{background:rgba(0,180,216,0.08);border:1px solid rgba(0,180,216,0.25);color:var(--cyan);}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1rem;}
.stat-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:1rem;text-align:center;
}
.stat-val{font-family:var(--serif);font-size:1.6rem;font-weight:900;color:var(--gold);}
.stat-lbl{font-size:0.68rem;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.06em;}

/* LOGIN PAGE */
.login-page{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--navy) 0%,var(--deep) 100%);
  padding:1rem;
}
.login-box{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:2rem;width:100%;max-width:420px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.login-logo{text-align:center;margin-bottom:1.5rem;}
.login-logo .big-icon{
  width:60px;height:60px;border-radius:16px;margin:0 auto 10px;
  background:linear-gradient(135deg,#8b6914,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:1.6rem;font-weight:900;color:#000;
  box-shadow:0 0 30px rgba(201,168,76,0.4);
}
.login-logo h2{font-family:var(--serif);font-size:1.3rem;color:var(--white);}
.login-logo p{font-size:0.75rem;color:var(--muted);margin-top:3px;}
.role-selector{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.2rem;
}
.role-btn{min-width:90px;
  background:var(--card2);border:1.5px solid var(--border);border-radius:10px;
  padding:12px 8px;text-align:center;cursor:pointer;transition:all 0.2s;
}
.role-btn:hover,.role-btn.active{
  border-color:rgba(201,168,76,0.5);background:rgba(201,168,76,0.08);
}
.role-btn .role-icon{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;overflow:hidden;border:3px solid rgba(255,255,255,0.1);transition:all 0.25s;box-shadow:0 4px 16px rgba(0,0,0,0.3);}
.role-btn.active .role-icon,.role-btn:hover .role-icon{border-color:var(--gold);box-shadow:0 4px 20px rgba(201,168,76,0.4);}
.role-btn .role-icon img{transition:transform 0.25s;}
.role-btn:hover .role-icon img{transform:scale(1.08);}
.role-btn .role-name{font-size:0.72rem;font-weight:600;color:var(--white);}
.nav-btn{white-space:nowrap;display:inline-flex;align-items:center;gap:5px;}.nav-btn svg{flex-shrink:0;opacity:0.75;}.nav-btn:hover svg,.nav-btn.active svg{opacity:1;}
.school-id-input{
  background:rgba(201,168,76,0.05);border:1px solid rgba(201,168,76,0.2);
  border-radius:10px;padding:10px 14px;margin-bottom:1rem;
  font-size:0.82rem;color:var(--gold);text-align:center;
  font-family:var(--mono);letter-spacing:0.1em;
}

/* SCORE TABLE */
.score-table input[type="number"]{
  width:65px;background:var(--card2);border:1px solid var(--border);
  border-radius:6px;padding:5px 6px;color:var(--white);font-size:0.8rem;
  text-align:center;outline:none;
}
.score-table input[type="number"]:focus{border-color:rgba(201,168,76,0.5);}
.score-table input.disabled{opacity:0.4;pointer-events:none;}
.total-cell{font-weight:700;font-family:var(--mono);color:var(--gold);}
.grand-total-cell{font-weight:800;font-family:var(--mono);color:var(--green);}

/* RESULT SHEET */
.result-sheet{
  background:#fff;color:#000;border-radius:12px;padding:24px;
  font-family:Arial,sans-serif;
}
.rs-header{text-align:center;border-bottom:3px double #0a0f2c;padding-bottom:12px;margin-bottom:16px;}
.rs-header h2{font-family:'Playfair Display',serif;font-size:1.4rem;color:#0a0f2c;font-weight:900;}
.rs-header p{font-size:0.82rem;color:#555;margin-top:4px;}
.rs-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;margin-bottom:16px;}
.rs-meta dt{color:#666;font-size:0.72rem;font-weight:700;text-transform:uppercase;}
.rs-meta dd{font-weight:700;color:#000;margin-left:0;}
.rs-tbl{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:0.82rem;}
.rs-tbl th{background:#0a0f2c;color:#fff;padding:7px 8px;text-align:left;font-size:0.72rem;}
.rs-tbl td{padding:6px 8px;border-bottom:1px solid #ddd;color:#000;}
.rs-tbl tr:nth-child(even) td{background:#f9f9f9;}
.rs-summary{display:flex;gap:20px;justify-content:flex-end;margin-top:10px;}
.rs-summary .sv{font-size:1.5rem;font-weight:900;color:#0a0f2c;}
.rs-summary .sl{font-size:0.68rem;color:#888;text-align:center;}
.rs-footer{margin-top:16px;border-top:1px solid #ddd;padding-top:10px;display:flex;justify-content:space-between;font-size:0.72rem;color:#888;}

/* RESULT LINK BOX */
.link-box{
  background:var(--card2);border:1px solid rgba(0,180,216,0.3);border-radius:10px;
  padding:12px 14px;display:flex;align-items:center;gap:10px;
  font-family:var(--mono);font-size:0.75rem;color:var(--cyan);word-break:break-all;
}

/* PAYMENT STATUS BAR */
.payment-bar{
  border-radius:10px;padding:12px 16px;margin-bottom:1rem;
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
}
.payment-bar.active{background:rgba(0,200,83,0.08);border:1px solid rgba(0,200,83,0.25);}
.payment-bar.due{background:rgba(255,165,0,0.08);border:1px solid rgba(255,165,0,0.25);}
.payment-bar.suspended{background:rgba(255,68,68,0.08);border:1px solid rgba(255,68,68,0.25);}

/* SUPER ADMIN SCHOOL CARD */
.school-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:1rem;margin-bottom:10px;display:flex;align-items:center;
  justify-content:space-between;gap:10px;flex-wrap:wrap;
}
.school-card-left h3{font-size:0.9rem;font-weight:700;color:var(--white);margin-bottom:2px;}
.school-card-left p{font-size:0.72rem;color:var(--muted);}

/* RESPONSIVE */
@media(max-width:600px){
  .form-grid{grid-template-columns:1fr;}
  .role-selector{grid-template-columns:1fr 1fr;}
  .stats-grid{grid-template-columns:1fr 1fr;}
}

/* PRINT */
@media print{
  /* Default: hide everything */
  body > * { display:none!important; }

  /* QR print overlay */
  #qr-print-overlay {
    display:grid!important;
    grid-template-columns:repeat(4,1fr);
    gap:10px;padding:12px;
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:#fff;z-index:9999;
  }
  #qr-print-overlay .qr-card {
    break-inside:avoid;border:1px solid #999;
    background:#fff!important;color:#000!important;
    padding:10px;border-radius:6px;text-align:center;
  }
  #qr-print-overlay .qr-card img {
    display:block!important;width:100px!important;height:100px!important;margin:0 auto 6px!important;
  }
  #qr-print-overlay .qr-card-name  { color:#000!important;font-size:0.72rem;font-weight:700; }
  #qr-print-overlay .qr-card-reg   { color:#333!important;font-size:0.62rem; }
  #qr-print-overlay .qr-card-class { color:#555!important;font-size:0.6rem; }

  /* Result sheet print */
  #result-print-frame {
    display:block!important;
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:#fff;z-index:9999;padding:20px;
    overflow:visible;
  }
  /* Token page result print */
  .result-sheet {
    display:block!important;
    background:#fff!important;
    color:#000!important;
    padding:20px!important;
  }
  .rs-header, .rs-meta, .rs-tbl, .rs-summary, .rs-footer {
    display:block!important;
  }
  .no-print { display:none!important; }
  .no-print{display:none!important;}
}

/* ── MODULES SYSTEM ── */
.modules-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px;}
.module-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden;}
.module-card.unlocked:hover{border-color:rgba(201,168,76,0.4);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3);}
.module-card.locked{opacity:0.65;cursor:not-allowed;}
.module-card.locked::after{content:'🔒';position:absolute;top:10px;right:10px;font-size:0.85rem;}
.module-icon{font-size:1.6rem;margin-bottom:8px;}
.module-name{font-size:0.88rem;font-weight:700;color:var(--white);margin-bottom:3px;}
.module-desc{font-size:0.72rem;color:var(--muted);line-height:1.4;}
.module-badge{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:0.6rem;font-weight:700;padding:3px 8px;border-radius:100px;}
.mb-active{background:rgba(0,200,83,0.12);color:var(--green);border:1px solid rgba(0,200,83,0.25);}
.mb-locked{background:rgba(255,68,68,0.1);color:var(--red);border:1px solid rgba(255,68,68,0.2);}
.mb-plan{background:rgba(201,168,76,0.1);color:var(--gold);border:1px solid rgba(201,168,76,0.2);}
.upgrade-box{background:linear-gradient(135deg,rgba(201,168,76,0.08),rgba(201,168,76,0.02));border:1px solid rgba(201,168,76,0.25);border-radius:14px;padding:20px;text-align:center;margin-top:12px;}
.upgrade-box h3{font-size:0.95rem;font-weight:700;color:var(--gold);margin-bottom:6px;}
.upgrade-box p{font-size:0.78rem;color:var(--muted);margin-bottom:14px;line-height:1.5;}
.plan-tag{display:inline-block;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:0.65rem;color:var(--gold);font-weight:600;margin-bottom:12px;}


/* ── QR CODE CARDS ── */
.qr-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;}
.qr-card canvas,.qr-card img{border-radius:6px;background:#fff;padding:4px;}
.qr-card-name{font-size:0.72rem;font-weight:700;color:var(--white);line-height:1.2;margin-top:2px;}
.qr-card-reg{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--gold);}
.qr-card-class{font-size:0.62rem;color:var(--muted);}
@media print{
  body > *:not(#qr-print-overlay){ display:none!important; }
  #qr-print-overlay{
    display:grid!important;
    grid-template-columns:repeat(4,1fr);
    gap:12px;padding:16px;
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:#fff;z-index:9999;
  }
  #qr-print-overlay .qr-card{
    break-inside:avoid;border:1px solid #ccc;
    background:#fff!important;color:#000!important;
    padding:10px;border-radius:6px;
  }
  #qr-print-overlay .qr-card canvas,
  #qr-print-overlay .qr-card img{ display:block!important; }
  #qr-print-overlay .qr-card-name{ color:#000!important;font-size:0.7rem; }
  #qr-print-overlay .qr-card-reg{  color:#333!important;font-size:0.62rem; }
  #qr-print-overlay .qr-card-class{color:#555!important;font-size:0.6rem; }
}

/* ── ATTENDANCE MODULE ── */
.att-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;}
.att-tab{background:transparent;border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:0.75rem;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all 0.2s;}
.att-tab.active{background:rgba(201,168,76,0.12);border-color:rgba(201,168,76,0.35);color:var(--gold);}
.att-student-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;}
.att-name{flex:1;font-size:0.85rem;font-weight:500;color:var(--white);}
.att-reg{font-size:0.68rem;color:var(--muted);font-family:'DM Mono',monospace;}
.att-btns{display:flex;gap:6px;}
.att-btn{width:36px;height:36px;border-radius:8px;border:none;cursor:pointer;font-size:0.85rem;font-weight:700;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
.att-present{background:rgba(0,200,83,0.15);color:var(--green);}
.att-present.selected{background:var(--green);color:#000;}
.att-absent{background:rgba(255,68,68,0.1);color:var(--red);}
.att-absent.selected{background:var(--red);color:#fff;}
.att-late{background:rgba(255,165,0,0.1);color:orange;}
.att-late.selected{background:orange;color:#000;}
.att-summary-bar{display:flex;gap:12px;padding:12px 14px;background:var(--card2);border-radius:10px;margin-bottom:14px;flex-wrap:wrap;}
.att-sum-item{display:flex;align-items:center;gap:6px;font-size:0.78rem;font-weight:600;}
.qr-scanner-wrap{text-align:center;padding:20px;}
.qr-video{width:100%;max-width:320px;border-radius:14px;border:2px solid var(--gold);margin:0 auto 12px;display:block;}
.qr-result{background:rgba(0,200,83,0.1);border:1px solid rgba(0,200,83,0.25);border-radius:10px;padding:12px;margin-top:12px;font-size:0.85rem;color:var(--green);display:none;}
.att-log{max-height:280px;overflow-y:auto;}
.att-log-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-bottom:1px solid var(--border);font-size:0.78rem;}
.att-log-name{color:var(--white);font-weight:500;}
.att-log-time{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);}
.att-status-p{color:var(--green);font-weight:700;font-size:0.72rem;}
